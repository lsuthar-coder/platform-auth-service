# .azure-pipelines/deploy-auth-service.yml

trigger:
  branches:
    include: [main]
  paths:
    include: [auth-service/**]

pool:
  name: Default  # self-hosted agent on OCI VM 2

variables:
  IMAGE_REPO: ghcr.io/$(GITHUB_USERNAME)/auth-service
  IMAGE_TAG:  $(Build.BuildId)

steps:
  - script: |
      echo $(GITHUB_TOKEN) | docker login ghcr.io -u $(GITHUB_USERNAME) --password-stdin
    displayName: Login to GHCR

  - script: |
      docker buildx create --use --name multiarch-builder 2>/dev/null || true
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        -t $(IMAGE_REPO):$(IMAGE_TAG) \
        -t $(IMAGE_REPO):latest \
        --push \
        ./auth-service
    displayName: Build and push multi-arch image

  - script: |
      kubectl set image deployment/auth-service \
        api=$(IMAGE_REPO):$(IMAGE_TAG) --record
    displayName: Update deployment

  - script: |
      kubectl rollout status deployment/auth-service --timeout=120s
    displayName: Wait for rollout

  - script: |
      sleep 5
      curl -sf http://auth-service:5000/health | grep '"status":"ok"'
    displayName: Smoke test health endpoint
