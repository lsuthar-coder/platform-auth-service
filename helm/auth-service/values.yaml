image:
  repository: ghcr.io/YOUR_GITHUB_USERNAME/auth-service
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

nodeSelector:
  kubernetes.io/hostname: k3s-server

replicaCount: 1

resources:
  requests:
    cpu:    100m
    memory: 150Mi
  limits:
    cpu:    500m
    memory: 350Mi

secretName: auth-service-secrets

ingress:
  enabled: false  # Auth is accessed via api.yourdomain.com/auth/* through Gateway
  host: auth.yourdomain.com
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    secretName: auth-service-tls
